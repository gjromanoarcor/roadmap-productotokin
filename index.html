<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Tokin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0d1017;
    --panel:#151a24;
    --panel-2:#1b2230;
    --line:#2a3242;
    --line-soft:#232b39;
    --text:#e7e9ee;
    --text-dim:#9aa3b2;
    --blue:#3d5afe;
    --blue-dark:#1a3fa0;
    --blue-soft:#1b2550;
    --green:#3ddc97;
    --amber:#f2b84b;
    --red:#ef6d6d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, "Segoe UI", Calibri, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:13px;
  }

  header.appbar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    z-index:60;
  }
  header.appbar .wordmark{
    display:flex;
    align-items:baseline;
    gap:2px;
    font-size:22px;
    font-weight:800;
    letter-spacing:-.01em;
    line-height:1;
  }
  header.appbar .wordmark .tokin{ color:var(--blue); }
  header.appbar .wordmark .tienda{ color:var(--text); font-weight:600; }
  header.appbar .wordmark .dot{ color:var(--blue-dark); }
  header.appbar h1{
    font-size:16px;
    font-weight:600;
    margin:0;
    color:var(--text);
    letter-spacing:.01em;
  }
  header.appbar .sub{
    font-size:12px;
    color:var(--text-dim);
  }

  .toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    padding:12px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    position:sticky;
    top:53px;
    z-index:50;
  }
  .toolbar input[type=text]{
    font-family:inherit;
    font-size:13px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:6px;
    min-width:230px;
    background:var(--panel-2);
    color:var(--text);
  }
  .toolbar input[type=text]::placeholder{ color:var(--text-dim); }
  .toolbar input[type=text]:focus{ outline:none; border-color:var(--blue); }

  .btn{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
  }
  .btn:hover{ background:#222a3a; border-color:#3a4358; }
  .btn.export{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
    margin-left:auto;
  }
  .btn.export:hover{ background:#2f47d6; }

  main{ padding:18px 20px 60px; overflow-x:auto; }

  table{
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    width:100%;
    table-layout:fixed;
  }
  th, td{
    border:1px solid var(--line-soft);
    padding:6px 8px;
  }
  thead th{
    background:var(--blue-soft);
    color:#c7d0ff;
    font-weight:700;
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:9px 8px;
  }
  th.col-plataforma{width:120px;}
  th.col-team{width:130px;}
  th.col-iniciativa{width:320px;}
  th.col-fecha{width:110px;}
  th.col-estado{width:190px;}
  th.col-comentarios{width:260px; max-width:260px;}
  th.col-del{width:26px;}

  tbody tr{ background:var(--panel); }
  tbody tr:nth-child(even){ background:var(--panel-2); }
  tbody tr:hover{ background:#1f2636; }

  td.col-plataforma, td.col-team, td.col-fecha, td.col-estado, td.col-iniciativa, td.col-comentarios{ padding:0; }
  input.cell{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    padding:6px 8px;
    color:var(--text);
  }
  input.cell::placeholder{ color:var(--text-dim); }
  input.cell:hover{ border-color:var(--line); }
  input.cell:focus{
    outline:none;
    border-color:var(--blue);
    background:#10182c;
  }

  td.col-comentarios{ vertical-align:top; }
  textarea.cell{
    width:100%;
    display:block;
    border:1px solid transparent;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    line-height:1.4;
    padding:6px 8px;
    color:var(--text);
    resize:none;
    overflow:hidden;
    white-space:pre-wrap;
    word-break:break-word;
    min-height:32px;
  }
  textarea.cell::placeholder{ color:var(--text-dim); }
  textarea.cell:hover{ border-color:var(--line); }
  textarea.cell:focus{
    outline:none;
    border-color:var(--blue);
    background:#10182c;
  }

  td.col-del{ text-align:center; padding:0; }
  .del-btn{
    border:none;
    background:transparent;
    color:var(--red);
    cursor:pointer;
    font-size:13px;
    width:100%;
    padding:6px 0;
  }
  .del-btn:hover{ background:#3a1c1c; }

  .drag-handle{
    cursor:grab;
    color:var(--text-dim);
    text-align:center;
    background:var(--panel-2);
    width:20px;
  }
  tr.dragging{ opacity:.35; }
  tr.drag-over td{ box-shadow: inset 0 2px 0 var(--blue); }

  input.estado-Refinado{ color:var(--green); font-weight:700; }
  input.estado-Enrefinamiento{ color:var(--amber); font-weight:700; }
  input.estado-Backlog{ color:var(--text-dim); }
  input.estado-PROD{ color:#7fd6ff; font-weight:700; }
  input.estado-Endesarrollo{ color:#9d8cff; font-weight:700; }

  footer.foot{
    padding:10px 20px 30px;
    font-size:11.5px;
    color:var(--text-dim);
  }
</style>
</head>
<body>

<header class="appbar">
  <div>
    <div class="wordmark"><span class="tokin">TOKINTIENDA</span><span class="tienda">&nbsp;ROADMAP</span></div>
    <div class="sub">Equipo de Producto</div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="Buscar iniciativa...">
  <button class="btn" id="addRowBtn">+ Fila</button>
  <button class="btn export" id="exportBtn">Exportar a Excel</button>
</div>

<main>
  <table id="roadmapTable">
    <thead>
      <tr>
        <th></th>
        <th class="col-plataforma">Plataforma</th>
        <th class="col-team">Product Team</th>
        <th class="col-iniciativa">Iniciativa</th>
        <th class="col-fecha">Fecha de inicio</th>
        <th class="col-fecha">Fecha de entrega</th>
        <th class="col-estado">Estado</th>
        <th class="col-comentarios">Comentarios</th>
        <th class="col-del"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<footer class="foot">roadmap_tokin · edición en vivo · exportá cuando termines</footer>

<script>
const ORIGINAL_DATA = [{"plataforma": "Tienda", "team": "Comunicación", "iniciativa": "POP -UPS", "inicio": "Junio", "fin": "Julio", "estado": "PROD"}, {"plataforma": "Admin", "team": "Promociones", "iniciativa": "Exclusión de PDVS en promociones", "inicio": "Julio", "fin": "Julio", "estado": "PROD"}, {"plataforma": "Tienda", "team": "Carrito", "iniciativa": "Performance en carrito (+50skus)", "inicio": "Junio", "fin": "Julio", "estado": "PROD"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Normalización descripción de Productos", "inicio": "Julio", "fin": "Julio", "estado": "PROD"}, {"plataforma": "Tienda", "team": "Comunicación", "iniciativa": "Personalización de banners (Hero-Search-Cart-Novedades nivel Id_pdv) (A)", "inicio": "Julio", "fin": "Julio", "estado": "En desarrollo"}, {"plataforma": "Tienda", "team": "Carrito", "iniciativa": "Actualizacion del minimo de compra 21k + iva", "inicio": "Julio", "fin": "Julio", "estado": "En desarrollo"}, {"plataforma": "Mejoras", "team": "Catalogo", "iniciativa": "Aumento de cantidades en selector de productos (999)", "inicio": "Julio", "fin": "Julio", "estado": "En desarrollo"}, {"plataforma": "Tienda", "team": "Promociones", "iniciativa": "Combo cerrado", "inicio": "Julio", "fin": "Agosto", "estado": "En desarrollo"}, {"plataforma": "Admin", "team": "Audiencias", "iniciativa": "Modulo de audiencias V1", "inicio": "Julio", "fin": "Agosto", "estado": "En refinamiento"}, {"plataforma": "Admin", "team": "Ecosistema", "iniciativa": "Roles y permisos de todos los usuarios", "inicio": "Julio", "fin": "Agosto", "estado": "Refinado"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Enriquecimiento de productos con Agente IA (TAGS)", "inicio": "Julio", "fin": "Agosto", "estado": "En refinamiento"}, {"plataforma": "Back", "team": "Ecosistema", "iniciativa": "Auditoría - Logs", "inicio": "Julio", "fin": "Septiembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Normalización descripción de Marcas", "inicio": "Agosto", "fin": "Agosto", "estado": "Refinado"}, {"plataforma": "Back", "team": "Analítica", "iniciativa": "Personalización de la tienda - Categorias y marcas", "inicio": "Agosto", "fin": "Agosto", "estado": "En refinamiento"}, {"plataforma": "Back", "team": "Analitica", "iniciativa": "Personalización de la tienda - banners", "inicio": "Agosto", "fin": "Septiembre", "estado": "Backlog"}, {"plataforma": "Admin", "team": "Audiencias", "iniciativa": "Modulo de Audiencias - integración con Audify", "inicio": "Agosto", "fin": "Septiembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Promociones", "iniciativa": "Precio fijo", "inicio": "Agosto", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Tienda", "team": "Promociones", "iniciativa": "Combo abierto", "inicio": "Agosto", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Admin", "team": "Promociones", "iniciativa": "Tipos de Presupuestos/bonificaciones en el formulario de promos", "inicio": "Agosto", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Tienda", "team": "Pedidos", "iniciativa": "Nueva experiencia de carga grandes pedidos", "inicio": "Septiembre", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Normalización descripción de Categorias", "inicio": "Septiembre", "fin": "Septiembre", "estado": "Refinado"}, {"plataforma": "Tienda", "team": "Pedidos", "iniciativa": "Pre-Venta exclusiva (reserva de producto) + habilitador de visualización de card de productos (A)", "inicio": "Septiembre", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Admin", "team": "Comunicación", "iniciativa": "Top bar en el Admin", "inicio": "Septiembre", "fin": "Septiembre", "estado": "En refinamiento"}, {"plataforma": "Tienda", "team": "Promociones", "iniciativa": "Nueva sección de promociones (A)", "inicio": "Septiembre", "fin": "Octubre", "estado": "Refinado"}, {"plataforma": "Tienda", "team": "Pay", "iniciativa": "Cuenta corriente + Pasarela de pagos  + opción pago parcial (A)", "inicio": "Agosto", "fin": "Octubre", "estado": "Stand by - A espera del proveedor"}, {"plataforma": "Motor promo", "team": "Promociones", "iniciativa": "Promo Gift (A)", "inicio": "Septiembre", "fin": "Octubre", "estado": "En refinamiento"}, {"plataforma": "Back", "team": "Producto", "iniciativa": "Apertura de la tienda al espacio público (consultivo)", "inicio": "Octubre", "fin": "Octubre", "estado": "Backlog - Belu quiere priorizar"}, {"plataforma": "Tienda", "team": "Comunicación", "iniciativa": "Nuevos espacios publicitarios (Sticky-Robapáginas-Rascacielos) (A)", "inicio": "Octubre", "fin": "Noviembre", "estado": "Refinado"}, {"plataforma": "Tienda", "team": "Registro/Login", "iniciativa": "Prehome - Exhibición de marcas/Cobertura/Tiempo de entrega/Fidelización", "inicio": "Noviembre", "fin": "Noviembre", "estado": "En refinamiento"}, {"plataforma": "Tienda", "team": "Fidelización", "iniciativa": "Plan de Fidelización (A)", "inicio": "Octubre", "fin": "Diciembre", "estado": "Stand by - a la espera del proveedor y presupuesto"}, {"plataforma": "Tienda", "team": "Perfil", "iniciativa": "Autogestión del pdv - Rol dueño y permisos de administración (Formulario de actualización)", "inicio": "Noviembre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Tags en cards de productos habilitador de segmentaciones  (ver arcor/partner/Chile)", "inicio": "Diciembre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Pedidos", "iniciativa": "Anulación de pedidos (A) - Cancelación con Timer para la bajada del ped (U)", "inicio": "Diciembre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Agente IA", "iniciativa": "Agente IA - Asistente de ventas en Tokin", "inicio": "Octubre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Admin", "team": "Config", "iniciativa": "Mantenimiento (opción en Admin) + Visual", "inicio": "Diciembre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Comunicación", "iniciativa": "Landing - Nuevas Gadgets Ej. Timer ofertas", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Registro/Login", "iniciativa": "Alta en Tokin independiente (onboarding) + Acceso AEC", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Pay", "iniciativa": "Opción combinación medios de pago", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Rediseño de Card de producto - Brief", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Perfil", "iniciativa": "Insights de negocio para el cliente", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Pay", "iniciativa": "Disponibilizar documentos legales en la cuenta corriente (descarga de los usuarios)", "inicio": "2027", "fin": "2027", "estado": "Backlog"}];
let data = JSON.parse(JSON.stringify(ORIGINAL_DATA));

const tbody = document.getElementById('tbody');
const searchBox = document.getElementById('searchBox');

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight) + 'px';
}

function escapeAttr(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function estadoClass(estado){
  return 'estado-' + String(estado || '').replace(/\s+/g,'');
}

function matchesFilter(item){
  const q = searchBox.value.trim().toLowerCase();
  if(!q) return true;
  return item.iniciativa.toLowerCase().includes(q) ||
         item.plataforma.toLowerCase().includes(q) ||
         item.team.toLowerCase().includes(q) ||
         item.estado.toLowerCase().includes(q) ||
         (item.comentarios || '').toLowerCase().includes(q);
}

function render(){
  tbody.innerHTML = '';
  data.forEach((item, idx) => {
    if(!matchesFilter(item)) return;
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.idx = idx;

    const tdHandle = document.createElement('td');
    tdHandle.className = 'drag-handle';
    tdHandle.textContent = '⠿';
    tr.appendChild(tdHandle);

    const tdPlat = document.createElement('td');
    tdPlat.className = 'col-plataforma';
    tdPlat.innerHTML = `<input class="cell" data-field="plataforma" value="${escapeAttr(item.plataforma)}">`;
    tr.appendChild(tdPlat);

    const tdTeam = document.createElement('td');
    tdTeam.className = 'col-team';
    tdTeam.innerHTML = `<input class="cell" data-field="team" value="${escapeAttr(item.team)}">`;
    tr.appendChild(tdTeam);

    const tdIniciativa = document.createElement('td');
    tdIniciativa.className = 'col-iniciativa';
    tdIniciativa.innerHTML = `<input class="cell" data-field="iniciativa" value="${escapeAttr(item.iniciativa)}">`;
    tr.appendChild(tdIniciativa);

    const tdInicio = document.createElement('td');
    tdInicio.className = 'col-fecha';
    tdInicio.innerHTML = `<input class="cell" data-field="inicio" value="${escapeAttr(item.inicio)}">`;
    tr.appendChild(tdInicio);

    const tdFin = document.createElement('td');
    tdFin.className = 'col-fecha';
    tdFin.innerHTML = `<input class="cell" data-field="fin" value="${escapeAttr(item.fin)}">`;
    tr.appendChild(tdFin);

    const tdEstado = document.createElement('td');
    tdEstado.className = 'col-estado';
    tdEstado.innerHTML = `<input class="cell ${estadoClass(item.estado)}" data-field="estado" value="${escapeAttr(item.estado)}">`;
    tr.appendChild(tdEstado);

    const tdComentarios = document.createElement('td');
    tdComentarios.className = 'col-comentarios';
    const taComentarios = document.createElement('textarea');
    taComentarios.className = 'cell';
    taComentarios.dataset.field = 'comentarios';
    taComentarios.rows = 1;
    taComentarios.value = item.comentarios || '';
    tdComentarios.appendChild(taComentarios);
    tr.appendChild(tdComentarios);
    autoResize(taComentarios);

    const tdDel = document.createElement('td');
    tdDel.className = 'col-del';
    tdDel.innerHTML = `<button class="del-btn" title="Eliminar fila">✕</button>`;
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  });
  attachRowEvents();
}

function attachRowEvents(){
  tbody.querySelectorAll('tr').forEach(tr => {
    const idx = Number(tr.dataset.idx);

    tr.querySelectorAll('input.cell, textarea.cell').forEach(inp => {
      inp.addEventListener('input', () => {
        data[idx][inp.dataset.field] = inp.value;
        if(inp.dataset.field === 'estado'){
          inp.className = 'cell ' + estadoClass(inp.value);
        }
        if(inp.tagName === 'TEXTAREA'){
          autoResize(inp);
        }
      });
    });

    tr.querySelector('.del-btn').addEventListener('click', () => {
      if(confirm('¿Eliminar "' + data[idx].iniciativa + '"?')){
        data.splice(idx, 1);
        render();
      }
    });

    tr.addEventListener('dragstart', () => tr.classList.add('dragging'));
    tr.addEventListener('dragend', () => {
      tr.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    });
    tr.addEventListener('dragover', (e) => {
      e.preventDefault();
      tr.classList.add('drag-over');
    });
    tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
    tr.addEventListener('drop', (e) => {
      e.preventDefault();
      const draggingTr = tbody.querySelector('tr.dragging');
      if(!draggingTr || draggingTr === tr) return;
      const fromIdx = Number(draggingTr.dataset.idx);
      const toIdx = Number(tr.dataset.idx);
      const [moved] = data.splice(fromIdx, 1);
      data.splice(toIdx, 0, moved);
      render();
    });
  });
}

document.getElementById('addRowBtn').addEventListener('click', () => {
  data.push({ plataforma:'', team:'', iniciativa:'Nueva iniciativa', inicio:'', fin:'', estado:'Backlog', comentarios:'' });
  render();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const rows = [];
  rows.push(['Plataforma','Product Team','Iniciativa','Fecha de inicio','Fecha de entrega','Estado','Comentarios']);
  data.forEach(item => {
    rows.push([item.plataforma, item.team, item.iniciativa, item.inicio, item.fin, item.estado, item.comentarios || '']);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:60},{wch:16},{wch:16},{wch:24},{wch:30}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Roadmap');
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `roadmap_actualizado_${stamp}.xlsx`);
});

searchBox.addEventListener('input', render);

render();
</script>

</body>
</html>
