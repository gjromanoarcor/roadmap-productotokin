<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Tokin</title>

<style>
  :root{
    --bg:#0d1017;
    --panel:#151a24;
    --panel-2:#1b2230;
    --line:#2a3242;
    --line-soft:#232b39;
    --text:#e7e9ee;
    --text-dim:#9aa3b2;
    --blue:#3d5afe;
    --blue-dark:#1a3fa0;
    --blue-soft:#1b2550;
    --green:#3ddc97;
    --amber:#f2b84b;
    --red:#ef6d6d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, "Segoe UI", Calibri, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    font-size:13px;
  }

  .sticky-top{
    position:sticky;
    top:0;
    z-index:60;
  }
  header.appbar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  header.appbar .wordmark{
    display:flex;
    align-items:baseline;
    gap:2px;
    font-size:22px;
    font-weight:800;
    letter-spacing:-.01em;
    line-height:1;
  }
  header.appbar .wordmark .tokin{ color:var(--blue); }
  header.appbar .wordmark .tienda{ color:var(--text); font-weight:600; }
  header.appbar .wordmark .dot{ color:var(--blue-dark); }
  header.appbar h1{
    font-size:16px;
    font-weight:600;
    margin:0;
    color:var(--text);
    letter-spacing:.01em;
  }
  header.appbar .sub{
    font-size:12px;
    color:var(--text-dim);
  }

  .toolbar{
    display:flex;
    gap:8px;
    align-items:center;
    padding:12px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .toolbar input[type=text]{
    font-family:inherit;
    font-size:13px;
    padding:8px 12px;
    border:1px solid var(--line);
    border-radius:6px;
    min-width:230px;
    background:var(--panel-2);
    color:var(--text);
  }
  .toolbar input[type=text]::placeholder{ color:var(--text-dim); }
  .toolbar input[type=text]:focus{ outline:none; border-color:var(--blue); }

  .btn{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
  }
  .btn:hover{ background:#222a3a; border-color:#3a4358; }
  .btn.export{
    background:var(--blue);
    border-color:var(--blue);
    color:#fff;
    margin-left:auto;
  }
  .btn.export:hover{ background:#2f47d6; }

  main{ padding:18px 20px 60px; overflow-x:auto; }

  table{
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    width:100%;
    table-layout:fixed;
  }
  th, td{
    border:1px solid var(--line-soft);
    padding:6px 8px;
  }
  thead th{
    background:var(--blue-soft);
    color:#c7d0ff;
    font-weight:700;
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:9px 8px;
  }
  th.col-plataforma{width:120px;}
  th.col-team{width:130px;}
  th.col-iniciativa{width:360px;}
  th.col-fecha{width:110px;}
  th.col-estado{width:190px;}
  th.col-comentarios{width:260px; max-width:260px;}
  th.col-del{width:26px;}

  tbody tr{ background:var(--panel); }
  tbody tr:nth-child(even){ background:var(--panel-2); }
  tbody tr:hover{ background:#1f2636; }

  td.col-plataforma, td.col-team, td.col-fecha, td.col-estado, td.col-comentarios{ padding:0; }
  td.col-iniciativa{ padding:0; vertical-align:top; }
  input.cell{
    width:100%;
    border:1px solid transparent;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    padding:6px 8px;
    color:var(--text);
  }
  input.cell::placeholder{ color:var(--text-dim); }
  input.cell:hover{ border-color:var(--line); }
  input.cell:focus{

    border-color:var(--blue);
    background:#10182c;
  }

  td.col-comentarios{ vertical-align:top; }
  textarea.iniciativa-field{ font-weight:600; }

  textarea.cell{
    width:100%;
    display:block;
    border:1px solid transparent;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    line-height:1.4;
    padding:6px 8px;
    color:var(--text);
    resize:none;
    overflow:hidden;
    white-space:pre-wrap;
    word-break:break-word;
    min-height:32px;

  textarea.cell::placeholder{ color:var(--text-dim); }
  textarea.cell:hover{ border-color:var(--line); }
  textarea.cell:focus{

    right:0;
    background:var(--panel);

    font-size:13px;
    width:100%;

  .tabs{

    background:var(--panel);
    border-bottom:1px solid var(--line);

  .tab-btn{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:10px 16px;
    border:none;
    background:transparent;
    color:var(--text-dim);

  }
  .tab-btn:hover{ color:var(--text); }
  .tab-btn.active{

    border-bottom:2px solid var(--blue);

</style>
</head>

<div class="sticky-top">

am": "Config", "iniciativa": "Mantenimiento (opción en Admin) + Visual", "inicio": "Diciembre", "fin": "Diciembre", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Comunicación", "iniciativa": "Landing - Nuevas Gadgets Ej. Timer ofertas", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Registro/Login", "iniciativa": "Alta en Tokin independiente (onboarding) + Acceso AEC", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Pay", "iniciativa": "Opción combinación medios de pago", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Catálogo", "iniciativa": "Rediseño de Card de producto - Brief", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Perfil", "iniciativa": "Insights de negocio para el cliente", "inicio": "2027", "fin": "2027", "estado": "Backlog"}, {"plataforma": "Tienda", "team": "Pay", "iniciativa": "Disponibilizar documentos legales en la cuenta corriente (descarga de los usuarios)", "inicio": "2027", "fin": "2027", "estado": "Backlog"}];
const ORIGINAL_ROADMAP = ORIGINAL_DATA;
const ORIGINAL_TAREAS = [];

const store = {
  roadmap: JSON.parse(JSON.stringify(ORIGINAL_ROADMAP)),
  tareas: JSON.parse(JSON.stringify(ORIGINAL_TAREAS))
};
let currentTab = 'roadmap';
let data = store[currentTab];

// ---- Persistencia en la nube (JSONBin) ----
const JSONBIN_ID = '6a579834f5f4af5e2992ddc9';
const JSONBIN_KEY = '$2a$10$kuPI.5kvyQg3/nxVinsrhe8VRzj3nBJzEn59ROG5DprBoXRwhqphS';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;

const syncStatusEl = document.getElementById('syncStatus');
function setSyncStatus(state){
  if(state === 'ok'){
    syncStatusEl.textContent = '●\u00a0Guardado';
    syncStatusEl.className = 'sync-status ok';
  } else if(state === 'saving'){
    syncStatusEl.textContent = '●\u00a0Guardando...';
    syncStatusEl.className = 'sync-status saving';
  } else if(state === 'loading'){
    syncStatusEl.textContent = '●\u00a0Cargando...';
    syncStatusEl.className = 'sync-status';
  } else {
    syncStatusEl.textContent = '●\u00a0Sin conexión';
    syncStatusEl.className = 'sync-status error';
  }
}

let saveTimer = null;
function scheduleSave(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRemote, 900);
}

async function saveRemote(){
  try{
    const res = await fetch(JSONBIN_BASE, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify({ data: store })
    });
    if(!res.ok) throw new Error('save failed');
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
}

async function loadRemote(){
  setSyncStatus('loading');
  try{
    const res = await fetch(JSONBIN_BASE + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if(!res.ok) throw new Error('load failed');
    const json = await res.json();
    const remote = json && json.record ? json.record.data : null;

    if(Array.isArray(remote) && remote.length > 0){
      // formato viejo: un solo array (era todo "roadmap")
      store.roadmap = remote;
      store.tareas = [];
      await saveRemote();
    } else if(remote && typeof remote === 'object' && (Array.isArray(remote.roadmap) || Array.isArray(remote.tareas))){
      store.roadmap = Array.isArray(remote.roadmap) ? remote.roadmap : [];
      store.tareas = Array.isArray(remote.tareas) ? remote.tareas : [];
    } else {
      // el bin está vacío: lo sembramos con los datos iniciales
      store.roadmap = JSON.parse(JSON.stringify(ORIGINAL_ROADMAP));
      store.tareas = JSON.parse(JSON.stringify(ORIGINAL_TAREAS));
      await saveRemote();
    }
    data = store[currentTab];
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
    // seguimos con los datos locales por defecto si falla la carga
  }
  render();
}

const tbody = document.getElementById('tbody');
const searchBox = document.getElementById('searchBox');

function autoResize(ta){
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight) + 'px';
}

function escapeAttr(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function estadoClass(estado){
  return 'estado-' + String(estado || '').replace(/\s+/g,'');
}

const filterPlataforma = document.getElementById('filterPlataforma');
const filterTeam = document.getElementById('filterTeam');
const filterInicio = document.getElementById('filterInicio');
const filterFin = document.getElementById('filterFin');
const filterEstado = document.getElementById('filterEstado');

function fillSelect(selectEl, values, placeholder){
  const current = selectEl.value;
  selectEl.innerHTML = `<option value="">${placeholder}</option>` +
    values.map(v => `<option value="${escapeAttr(v)}">${v}</option>`).join('');
  if(values.includes(current)) selectEl.value = current;
}

function populateFilterOptions(){
  const uniq = (field) => Array.from(new Set(data.map(d => (d[field] || '').trim()).filter(Boolean))).sort();
  fillSelect(filterPlataforma, uniq('plataforma'), 'Plataforma: todas');
  fillSelect(filterTeam, uniq('team'), 'Product Team: todos');
  fillSelect(filterInicio, uniq('inicio'), 'Fecha inicio: todas');
  fillSelect(filterFin, uniq('fin'), 'Fecha entrega: todas');
  fillSelect(filterEstado, uniq('estado'), 'Estado: todos');
}

function matchesFilter(item){
  const q = searchBox.value.trim().toLowerCase();
  if(q){
    const matchesText = item.iniciativa.toLowerCase().includes(q) ||
         item.plataforma.toLowerCase().includes(q) ||
         item.team.toLowerCase().includes(q) ||
         item.estado.toLowerCase().includes(q) ||
         (item.comentarios || '').toLowerCase().includes(q);
    if(!matchesText) return false;
  }
  if(filterPlataforma.value && item.plataforma !== filterPlataforma.value) return false;
  if(filterTeam.value && item.team !== filterTeam.value) return false;
  if(filterInicio.value && item.inicio !== filterInicio.value) return false;
  if(filterFin.value && item.fin !== filterFin.value) return false;
  if(filterEstado.value && item.estado !== filterEstado.value) return false;
  return true;
}

function render(){
  populateFilterOptions();
  tbody.innerHTML = '';
  data.forEach((item, idx) => {
    if(!matchesFilter(item)) return;
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.idx = idx;

    const tdHandle = document.createElement('td');
    tdHandle.className = 'drag-handle';
    tdHandle.textContent = '⠿';
    tr.appendChild(tdHandle);

    const tdPlat = document.createElement('td');
    tdPlat.className = 'col-plataforma';
    tdPlat.innerHTML = `<input class="cell" data-field="plataforma" value="${escapeAttr(item.plataforma)}" spellcheck="false" lang="es">`;
    tr.appendChild(tdPlat);

    const tdTeam = document.createElement('td');
    tdTeam.className = 'col-team';
    tdTeam.innerHTML = `<input class="cell" data-field="team" value="${escapeAttr(item.team)}" spellcheck="false" lang="es">`;
    tr.appendChild(tdTeam);

    const tdIniciativa = document.createElement('td');
    tdIniciativa.className = 'col-iniciativa';
    const taIniciativa = document.createElement('textarea');
    taIniciativa.className = 'cell iniciativa-field';
    taIniciativa.dataset.field = 'iniciativa';
    taIniciativa.rows = 1;
    taIniciativa.spellcheck = false;
    taIniciativa.lang = 'es';
    taIniciativa.value = item.iniciativa;
    tdIniciativa.appendChild(taIniciativa);
    tr.appendChild(tdIniciativa);

    const tdInicio = document.createElement('td');
    tdInicio.className = 'col-fecha';
    tdInicio.innerHTML = `<input class="cell" data-field="inicio" value="${escapeAttr(item.inicio)}" spellcheck="false" lang="es">`;
    tr.appendChild(tdInicio);

    const tdFin = document.createElement('td');
    tdFin.className = 'col-fecha';
    tdFin.innerHTML = `<input class="cell" data-field="fin" value="${escapeAttr(item.fin)}" spellcheck="false" lang="es">`;
    tr.appendChild(tdFin);

    const tdEstado = document.createElement('td');
    tdEstado.className = 'col-estado';
    tdEstado.innerHTML = `<input class="cell ${estadoClass(item.estado)}" data-field="estado" value="${escapeAttr(item.estado)}" spellcheck="false" lang="es">`;
    tr.appendChild(tdEstado);

    const tdComentarios = document.createElement('td');
    tdComentarios.className = 'col-comentarios';
    const taComentarios = document.createElement('textarea');
    taComentarios.className = 'cell';
    taComentarios.dataset.field = 'comentarios';
    taComentarios.rows = 1;
    taComentarios.spellcheck = false;
    taComentarios.lang = 'es';
    taComentarios.value = item.comentarios || '';
    tdComentarios.appendChild(taComentarios);
    tr.appendChild(tdComentarios);

    const tdDel = document.createElement('td');
    tdDel.className = 'col-del';
    tdDel.innerHTML = `<button class="del-btn" title="Eliminar fila">✕</button>`;
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  });
  tbody.querySelectorAll('textarea.cell').forEach(autoResize);
  attachRowEvents();
}

function attachRowEvents(){
  tbody.querySelectorAll('tr').forEach(tr => {
    const idx = Number(tr.dataset.idx);

    tr.querySelectorAll('input.cell, textarea.cell').forEach(inp => {
      inp.addEventListener('input', () => {
        data[idx][inp.dataset.field] = inp.value;
        if(inp.dataset.field === 'estado'){
          inp.className = 'cell ' + estadoClass(inp.value);
        }
        if(inp.tagName === 'TEXTAREA'){
          autoResize(inp);
        }
        scheduleSave();
      });
    });

    tr.querySelector('.del-btn').addEventListener('click', () => {
      if(confirm('¿Eliminar "' + data[idx].iniciativa + '"?')){
        data.splice(idx, 1);
        render();
        scheduleSave();
      }
    });

    tr.addEventListener('dragstart', () => tr.classList.add('dragging'));
    tr.addEventListener('dragend', () => {
      tr.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    });
    tr.addEventListener('dragover', (e) => {
      e.preventDefault();
      tr.classList.add('drag-over');
    });
    tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
    tr.addEventListener('drop', (e) => {
      e.preventDefault();
      const draggingTr = tbody.querySelector('tr.dragging');
      if(!draggingTr || draggingTr === tr) return;
      const fromIdx = Number(draggingTr.dataset.idx);
      const toIdx = Number(tr.dataset.idx);
      const [moved] = data.splice(fromIdx, 1);
      data.splice(toIdx, 0, moved);
      render();
      scheduleSave();
    });
  });
}

document.getElementById('addRowBtn').addEventListener('click', () => {
  const nombre = currentTab === 'tareas' ? 'Nueva tarea' : 'Nueva iniciativa';
  data.push({ plataforma:'', team:'', iniciativa:nombre, inicio:'', fin:'', estado:'Backlog', comentarios:'' });
  render();
  scheduleSave();
});

function switchTab(tab){
  currentTab = tab;
  data = store[currentTab];
  document.getElementById('tabRoadmap').classList.toggle('active', tab === 'roadmap');
  document.getElementById('tabTareas').classList.toggle('active', tab === 'tareas');
  searchBox.value = '';
  filterPlataforma.value = '';
  filterTeam.value = '';
  filterInicio.value = '';
  filterFin.value = '';
  filterEstado.value = '';
  render();
}
document.getElementById('tabRoadmap').addEventListener('click', () => switchTab('roadmap'));
document.getElementById('tabTareas').addEventListener('click', () => switchTab('tareas'));

document.getElementById('exportBtn').addEventListener('click', () => {
  const header = ['Plataforma','Product Team','Iniciativa','Fecha de inicio','Fecha de entrega','Estado','Comentarios'];
  const cols = [{wch:16},{wch:16},{wch:60},{wch:16},{wch:16},{wch:24},{wch:30}];

  const wb = XLSX.utils.book_new();

  const rowsRoadmap = [header];
  store.roadmap.forEach(item => {
    rowsRoadmap.push([item.plataforma, item.team, item.iniciativa, item.inicio, item.fin, item.estado, item.comentarios || '']);
  });
  const wsRoadmap = XLSX.utils.aoa_to_sheet(rowsRoadmap);
  wsRoadmap['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, wsRoadmap, 'Roadmap');

  const rowsTareas = [header];
  store.tareas.forEach(item => {
    rowsTareas.push([item.plataforma, item.team, item.iniciativa, item.inicio, item.fin, item.estado, item.comentarios || '']);
  });
  const wsTareas = XLSX.utils.aoa_to_sheet(rowsTareas);
  wsTareas['!cols'] = cols;
  XLSX.utils.book_append_sheet(wb, wsTareas, 'Tareas internas');

  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `roadmap_actualizado_${stamp}.xlsx`);
});

searchBox.addEventListener('input', render);
[filterPlataforma, filterTeam, filterInicio, filterFin, filterEstado].forEach(sel => {
  sel.addEventListener('change', render);
});
document.getElementById('clearFiltersBtn').addEventListener('click', () => {
  searchBox.value = '';
  filterPlataforma.value = '';
  filterTeam.value = '';
  filterInicio.value = '';
  filterFin.value = '';
  filterEstado.value = '';
  render();
});

loadRemote();
</script>

</body>
</html>
